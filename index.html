<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gamelist → map.txt</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #232636;
      --border: #2e3147;
      --accent: #6c8ef5;
      --accent-hover: #8aa4ff;
      --text: #e2e4f0;
      --text-muted: #7c8099;
      --success: #4caf82;
      --danger: #e05c6a;
      --radius: 8px;
      --radius-lg: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    header {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 18px; font-weight: 600; }
    header span { color: var(--text-muted); font-size: 13px; }

    .badge {
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }

    /* LANG SWITCHER */
    .lang-switcher {
      display: flex;
      gap: 2px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 3px;
    }
    .lang-btn {
      padding: 3px 10px;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-muted);
      transition: background 0.15s, color 0.15s;
      letter-spacing: 0.3px;
    }
    .lang-btn.active { background: var(--accent); color: #fff; }
    .lang-btn:not(.active):hover { color: var(--text); }

    main { padding: 32px; max-width: 1400px; margin: 0 auto; }

    /* DROP ZONE */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius-lg);
      padding: 60px 32px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: var(--surface);
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(108, 142, 245, 0.05);
    }
    .drop-zone input[type="file"] { display: none; }
    .drop-zone-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.6; }
    .drop-zone h2 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .drop-zone p { color: var(--text-muted); font-size: 13px; }
    .drop-zone .btn-link {
      color: var(--accent);
      text-decoration: underline;
      cursor: pointer;
      background: none;
      border: none;
      font-size: 13px;
      font-family: inherit;
    }

    /* TOOLBAR */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }

    select, input[type="text"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 6px 10px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    select:focus, input[type="text"]:focus { border-color: var(--accent); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--surface2); color: var(--text); border-color: var(--border); }
    .btn-secondary:hover { border-color: var(--accent); }
    .btn-success { background: var(--success); color: #fff; }
    .btn-success:hover { filter: brightness(1.1); }
    .btn-danger { background: transparent; color: var(--danger); border-color: var(--danger); }
    .btn-danger:hover { background: rgba(224, 92, 106, 0.1); }
    .btn-sm { padding: 4px 8px; font-size: 12px; }

    /* STATS */
    .stats { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 18px;
    }
    .stat-value { font-size: 20px; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    /* TABLE */
    .table-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .table-header {
      display: grid;
      grid-template-columns: 40px 1fr 1fr 1fr 80px;
      padding: 10px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .table-body { overflow-y: auto; max-height: 55vh; }
    .table-row {
      display: grid;
      grid-template-columns: 40px 1fr 1fr 1fr 80px;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      align-items: center;
      transition: background 0.1s;
    }
    .table-row:last-child { border-bottom: none; }
    .table-row:hover { background: var(--surface2); }
    .row-num { color: var(--text-muted); font-size: 11px; }
    .cell { padding: 0 8px; overflow: hidden; }
    .filename {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .display-name-cell { position: relative; }
    .display-name-input {
      width: 100%;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 4px;
      color: var(--text);
      padding: 3px 6px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .display-name-input:hover { border-color: var(--border); background: var(--surface2); }
    .display-name-input:focus { border-color: var(--accent); background: var(--surface2); }
    .display-name-input.modified { color: var(--accent); }
    .actions { display: flex; gap: 4px; justify-content: flex-end; }

    /* PREVIEW PANEL */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      margin-top: 20px;
      overflow: hidden;
    }
    .panel-header {
      padding: 12px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-title { font-size: 13px; font-weight: 600; }
    .panel-body { padding: 16px; }
    .preview-code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      color: var(--text-muted);
      white-space: pre;
      max-height: 200px;
      overflow-y: auto;
      line-height: 1.6;
    }
    .preview-line-file { color: var(--accent); }
    .preview-line-name { color: var(--text); }

    /* TEMPLATE BUILDER */
    .template-builder {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 20px;
    }
    .template-builder-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .template-label { font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .template-input-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
    .template-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 8px 12px;
      font-size: 13px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      outline: none;
      transition: border-color 0.15s;
    }
    .template-input:focus { border-color: var(--accent); }
    .template-tokens { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .token {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--accent);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    .token:hover { border-color: var(--accent); background: rgba(108,142,245,0.1); }
    .token-desc { color: var(--text-muted); font-family: inherit; font-size: 10px; }
    .template-presets { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .preset-btn {
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .preset-btn:hover { border-color: var(--accent); color: var(--text); }
    .template-preview-line {
      font-size: 12px;
      color: var(--text-muted);
      font-family: 'SF Mono', 'Fira Code', monospace;
      margin-top: 8px;
      padding: 6px 10px;
      background: var(--surface2);
      border-radius: 4px;
      border-left: 2px solid var(--accent);
    }
    .template-preview-line span { color: var(--text); }

    /* MISC */
    .hidden { display: none !important; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    .search-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 6px 10px 6px 30px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
      width: 200px;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-wrapper { position: relative; }
    .search-icon {
      position: absolute;
      left: 8px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 13px;
      pointer-events: none;
    }
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 18px;
      font-size: 13px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      transition: opacity 0.3s, transform 0.3s;
      z-index: 1000;
    }
    .toast.hide { opacity: 0; transform: translateY(10px); }
  </style>
</head>
<body>

<header>
  <span style="font-size: 20px;">🎮</span>
  <h1>Gamelist → map.txt</h1>
  <span class="badge">ES-DE / Pegasus</span>
  <span style="flex:1"></span>
  <span data-i18n="headerSubtitle" style="color: var(--text-muted); font-size: 12px;"></span>
  <div class="lang-switcher">
    <button class="lang-btn active" id="btnEn" onclick="setLang('en')">EN</button>
    <button class="lang-btn" id="btnFr" onclick="setLang('fr')">FR</button>
  </div>
</header>

<main>

  <!-- DROP ZONE -->
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".xml">
    <div class="drop-zone-icon">📂</div>
    <h2 data-i18n="dropTitle"></h2>
    <p>
      <span data-i18n="dropOr"></span>
      <button class="btn-link" data-i18n="dropBrowse" onclick="document.getElementById('fileInput').click()"></button>
    </p>
    <p style="margin-top: 8px; font-size: 12px;" data-i18n="dropHint"></p>
  </div>

  <!-- APP (hidden until file loaded) -->
  <div id="app" class="hidden">

    <!-- STATS -->
    <div class="stats" style="margin-top: 24px;">
      <div class="stat">
        <div class="stat-value" id="statTotal">0</div>
        <div class="stat-label" data-i18n="statTotal"></div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statModified">0</div>
        <div class="stat-label" data-i18n="statModified"></div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statFiltered">0</div>
        <div class="stat-label" data-i18n="statFiltered"></div>
      </div>
    </div>

    <!-- TEMPLATE BUILDER -->
    <div class="template-builder">
      <div class="template-builder-header">
        <span class="template-label" data-i18n="templateTitle"></span>
        <span style="color: var(--text-muted); font-size: 12px;">
          <span data-i18n="templateHint"></span>
          <code style="background:var(--surface2);padding:1px 5px;border-radius:3px;font-size:11px">{variable}</code>
        </span>
      </div>

      <div class="template-input-row">
        <input type="text" class="template-input" id="templateInput" value="{name}" oninput="onTemplateChange()" data-i18n-placeholder="templatePlaceholder">
        <button class="btn btn-primary btn-sm" data-i18n="templateApply" onclick="applyFieldToAll()"></button>
      </div>

      <div style="margin-bottom: 8px;">
        <span class="template-label" style="font-size: 11px; margin-right: 8px;" data-i18n="templateVars"></span>
        <div class="template-tokens" id="tokenList"></div>
      </div>

      <div>
        <span class="template-label" style="font-size: 11px; margin-right: 8px;" data-i18n="templatePresets"></span>
        <div class="template-presets" id="presetList"></div>
      </div>

      <div class="template-preview-line" id="templatePreviewLine">
        <span data-i18n="templatePreview"></span> <span id="templatePreviewValue">—</span>
      </div>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
      <div class="toolbar-group">
        <div class="search-wrapper">
          <span class="search-icon">🔍</span>
          <input type="text" class="search-input" id="searchInput" oninput="filterRows()" data-i18n-placeholder="searchPlaceholder">
        </div>
      </div>
      <div class="toolbar-group" style="flex: 0;">
        <button class="btn btn-danger btn-sm" data-i18n="btnReset" onclick="resetAll()"></button>
        <button class="btn btn-success" data-i18n="btnDownload" onclick="generateAndDownload()"></button>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-container">
      <div class="table-header">
        <div>#</div>
        <div class="cell" data-i18n="colFile"></div>
        <div class="cell" data-i18n="colOrigName"></div>
        <div class="cell" data-i18n="colDisplayName"></div>
        <div class="cell" style="text-align:right" data-i18n="colActions"></div>
      </div>
      <div class="table-body" id="tableBody"></div>
    </div>

    <!-- PREVIEW -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title" data-i18n="previewTitle"></span>
        <button class="btn btn-secondary btn-sm" data-i18n="previewRefresh" onclick="updatePreview()"></button>
      </div>
      <div class="panel-body">
        <div class="preview-code" id="previewCode"></div>
      </div>
    </div>

  </div>
</main>

<div class="toast hide" id="toast"></div>

<script>
  // ─── i18n ─────────────────────────────────────────────────────────────────
  let lang = localStorage.getItem('lang') || 'en';

  const I18N = {
    en: {
      headerSubtitle:     'gamelist.xml converter',
      dropTitle:          'Drop your gamelist.xml here',
      dropOr:             'or',
      dropBrowse:         'browse your files',
      dropHint:           'Accepted format: gamelist.xml (EmulationStation / ES-DE)',
      statTotal:          'Total games',
      statModified:       'Modified names',
      statFiltered:       'Shown (filter)',
      templateTitle:      'Display name template',
      templateHint:       'Combine multiple fields with',
      templatePlaceholder:'e.g. {name} ({year}) — {developer}',
      templateApply:      '↺ Apply to all',
      templateVars:       'Available variables:',
      templatePresets:    'Presets:',
      templatePreview:    'Preview:',
      templatePreviewFirst:'Preview (1st game):',
      templateEmpty:      '⚠ empty result',
      searchPlaceholder:  'Search...',
      btnReset:           'Reset',
      btnDownload:        '⬇ Download map.txt',
      colFile:            'File (path)',
      colOrigName:        'Original name (XML)',
      colDisplayName:     'Display name in map.txt',
      colActions:         'Actions',
      previewTitle:       'map.txt preview',
      previewRefresh:     'Refresh',
      resetRowTitle:      'Reset this name',
      editNameTitle:      'Edit display name',
      confirmReset:       'Reset all modified names?',
      toastLoaded:        n => `${n} games loaded successfully.`,
      toastApplied:       'Template applied to all games.',
      toastGenerated:     n => `map.txt generated — ${n} entries.`,
      toastNoGames:       'No games found in the XML file. Check the format.',
      moreLines:          n => `… and ${n} more lines`,
      tokenName:          'Official name',
      tokenFilename:      'File (no ext.)',
      tokenYear:          'Release year',
      tokenDeveloper:     'Developer',
      tokenPublisher:     'Publisher',
      tokenFamily:        'Series / Family',
      tokenGenre:         'Genre',
      tokenPlayers:       'Players',
      tokenLang:          'Language',
      tokenRating:        'Rating (0-1)',
    },
    fr: {
      headerSubtitle:     'Convertisseur de gamelist.xml',
      dropTitle:          'Déposer votre gamelist.xml ici',
      dropOr:             'ou',
      dropBrowse:         'parcourir vos fichiers',
      dropHint:           'Format accepté : gamelist.xml (EmulationStation / ES-DE)',
      statTotal:          'Jeux au total',
      statModified:       'Noms modifiés',
      statFiltered:       'Affichés (filtre)',
      templateTitle:      'Template du nom affiché',
      templateHint:       'Combinez plusieurs champs avec',
      templatePlaceholder:'ex : {name} ({year}) — {developer}',
      templateApply:      '↺ Appliquer à tous',
      templateVars:       'Variables disponibles :',
      templatePresets:    'Présets :',
      templatePreview:    'Aperçu :',
      templatePreviewFirst:'Aperçu (1er jeu) :',
      templateEmpty:      '⚠ résultat vide',
      searchPlaceholder:  'Rechercher...',
      btnReset:           'Réinitialiser',
      btnDownload:        '⬇ Télécharger map.txt',
      colFile:            'Fichier (path)',
      colOrigName:        'Nom original (XML)',
      colDisplayName:     'Nom affiché dans map.txt',
      colActions:         'Actions',
      previewTitle:       'Aperçu map.txt',
      previewRefresh:     'Actualiser',
      resetRowTitle:      'Réinitialiser ce nom',
      editNameTitle:      'Éditer le nom affiché',
      confirmReset:       'Réinitialiser tous les noms modifiés ?',
      toastLoaded:        n => `${n} jeux chargés avec succès.`,
      toastApplied:       'Template appliqué à tous les jeux.',
      toastGenerated:     n => `map.txt généré — ${n} entrées.`,
      toastNoGames:       'Aucun jeu trouvé dans le fichier XML. Vérifiez le format.',
      moreLines:          n => `… et ${n} autres lignes`,
      tokenName:          'Nom officiel',
      tokenFilename:      'Fichier (sans ext.)',
      tokenYear:          'Année de sortie',
      tokenDeveloper:     'Développeur',
      tokenPublisher:     'Éditeur',
      tokenFamily:        'Série / Famille',
      tokenGenre:         'Genre',
      tokenPlayers:       'Joueurs',
      tokenLang:          'Langue',
      tokenRating:        'Note (0-1)',
    },
  };

  function t(key, arg) {
    const val = I18N[lang][key];
    if (typeof val === 'function') return val(arg);
    return val ?? key;
  }

  function setLang(l) {
    lang = l;
    localStorage.setItem('lang', l);
    document.documentElement.lang = l;
    document.getElementById('btnEn').classList.toggle('active', l === 'en');
    document.getElementById('btnFr').classList.toggle('active', l === 'fr');
    applyI18n();
    initTemplateUI();       // re-render token labels
    if (games.length) {
      renderTable();
      updateTemplatePreviewLine();
      updatePreview();
    }
  }

  function applyI18n() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
      el.textContent = t(el.dataset.i18n);
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      el.placeholder = t(el.dataset.i18nPlaceholder);
    });
  }

  // ─── State ────────────────────────────────────────────────────────────────
  let games = [];
  let filterText = '';

  // ─── Token & Preset definitions ───────────────────────────────────────────
  const TOKENS = [
    { key: 'name',      labelKey: 'tokenName' },
    { key: 'filename',  labelKey: 'tokenFilename' },
    { key: 'year',      labelKey: 'tokenYear' },
    { key: 'developer', labelKey: 'tokenDeveloper' },
    { key: 'publisher', labelKey: 'tokenPublisher' },
    { key: 'family',    labelKey: 'tokenFamily' },
    { key: 'genre',     labelKey: 'tokenGenre' },
    { key: 'players',   labelKey: 'tokenPlayers' },
    { key: 'lang',      labelKey: 'tokenLang' },
    { key: 'rating',    labelKey: 'tokenRating' },
  ];

  const PRESETS = [
    '{name}',
    '{name} ({year})',
    '{name} \u2014 {developer}',
    '{name} ({year}) \u2014 {developer}',
    '{family}: {name}',
    '{filename}',
  ];

  // ─── Template engine ──────────────────────────────────────────────────────
  function applyTemplate(template, fields) {
    return template
      .replace(/\{(\w+)\}/g, (_, key) => (fields[key] ?? ''))
      .replace(/\s{2,}/g, ' ')
      .trim();
  }

  // ─── Init UI tokens & presets ─────────────────────────────────────────────
  function initTemplateUI() {
    const tokenList = document.getElementById('tokenList');
    tokenList.innerHTML = TOKENS.map(tk => `
      <button class="token" data-token="{${tk.key}}" title="${t(tk.labelKey)}">
        {${tk.key}} <span class="token-desc">${escapeHtml(t(tk.labelKey))}</span>
      </button>
    `).join('');
    // Remove old listener by cloning the node
    const fresh = tokenList.cloneNode(true);
    tokenList.parentNode.replaceChild(fresh, tokenList);
    fresh.addEventListener('click', e => {
      const btn = e.target.closest('[data-token]');
      if (btn) insertToken(btn.dataset.token);
    });

    const presetList = document.getElementById('presetList');
    presetList.innerHTML = PRESETS.map(p => `
      <button class="preset-btn" data-tpl="${p.replace(/"/g, '&quot;')}">${escapeHtml(p)}</button>
    `).join('');
    const freshP = presetList.cloneNode(true);
    presetList.parentNode.replaceChild(freshP, presetList);
    freshP.addEventListener('click', e => {
      const btn = e.target.closest('[data-tpl]');
      if (btn) setTemplate(btn.dataset.tpl);
    });
  }

  function insertToken(token) {
    const input = document.getElementById('templateInput');
    const start = input.selectionStart;
    const end = input.selectionEnd;
    input.value = input.value.slice(0, start) + token + input.value.slice(end);
    input.selectionStart = input.selectionEnd = start + token.length;
    input.focus();
    onTemplateChange();
  }

  function setTemplate(tpl) {
    document.getElementById('templateInput').value = tpl;
    onTemplateChange();
  }

  function onTemplateChange() {
    updateTemplatePreviewLine();
  }

  function updateTemplatePreviewLine() {
    const tpl = document.getElementById('templateInput').value;
    const previewKey = document.getElementById('templatePreviewLine').querySelector('[data-i18n]');
    if (previewKey) previewKey.textContent = games.length ? t('templatePreviewFirst') : t('templatePreview');
    const valEl = document.getElementById('templatePreviewValue');
    if (!games.length) { valEl.textContent = '—'; return; }
    const result = applyTemplate(tpl, games[0].fields);
    valEl.textContent = result || t('templateEmpty');
  }

  // ─── File handling ────────────────────────────────────────────────────────
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) loadFile(file);
  });
  fileInput.addEventListener('change', e => {
    if (e.target.files[0]) loadFile(e.target.files[0]);
  });

  function loadFile(file) {
    const reader = new FileReader();
    reader.onload = e => parseGamelist(e.target.result);
    reader.readAsText(file, 'UTF-8');
  }

  // ─── Parse XML ────────────────────────────────────────────────────────────
  function parseGamelist(xml) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(xml, 'text/xml');
    const gameEls = doc.querySelectorAll('game');

    if (gameEls.length === 0) {
      showToast(t('toastNoGames'));
      return;
    }

    const tpl = document.getElementById('templateInput').value || '{name}';

    games = Array.from(gameEls).map(el => {
      const get = tag => (el.querySelector(tag)?.textContent || '').trim();
      const rawPath = get('path');
      const cleanPath = rawPath.replace(/^\.\//, '');
      const filenameNoExt = cleanPath.replace(/\.[^/.]+$/, '').split('/').pop();
      const releasedate = get('releasedate');

      const fields = {
        name:      get('name'),
        filename:  filenameNoExt,
        year:      releasedate ? releasedate.slice(0, 4) : '',
        developer: get('developer'),
        publisher: get('publisher'),
        family:    get('family'),
        genre:     get('genre'),
        players:   get('players'),
        lang:      get('lang'),
        rating:    get('rating'),
      };

      return {
        path: cleanPath,
        fields,
        displayName: applyTemplate(tpl, fields) || fields.name || filenameNoExt,
        modified: false,
      };
    });

    document.getElementById('dropZone').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    updateTemplatePreviewLine();
    renderTable();
    updateStats();
    updatePreview();
    showToast(t('toastLoaded', games.length));
  }

  // ─── Render table ─────────────────────────────────────────────────────────
  function getFilteredGames() {
    if (!filterText) return games.map((g, i) => ({ game: g, idx: i }));
    const q = filterText.toLowerCase();
    return games
      .map((g, i) => ({ game: g, idx: i }))
      .filter(({ game: g }) =>
        g.path.toLowerCase().includes(q) ||
        g.displayName.toLowerCase().includes(q) ||
        (g.fields.name || '').toLowerCase().includes(q)
      );
  }

  function renderTable() {
    const tbody = document.getElementById('tableBody');
    const filtered = getFilteredGames();
    const resetTitle = t('resetRowTitle');
    const editTitle  = t('editNameTitle');

    tbody.innerHTML = filtered.map(({ game: g, idx }, rowNum) => {
      const esc = val => (val || '').replace(/"/g, '&quot;').replace(/</g, '&lt;');
      return `
        <div class="table-row" id="row-${idx}">
          <div class="row-num">${rowNum + 1}</div>
          <div class="cell"><span class="filename" title="${esc(g.path)}">${esc(g.path)}</span></div>
          <div class="cell"><span class="filename" style="color:var(--text-muted)">${esc(g.fields.name || '—')}</span></div>
          <div class="cell display-name-cell">
            <input
              class="display-name-input ${g.modified ? 'modified' : ''}"
              id="input-${idx}"
              type="text"
              value="${esc(g.displayName)}"
              oninput="onDisplayNameChange(${idx}, this.value)"
              title="${esc(editTitle)}"
            >
          </div>
          <div class="cell actions">
            <button class="btn btn-secondary btn-sm" onclick="resetRow(${idx})" title="${esc(resetTitle)}">↺</button>
          </div>
        </div>
      `;
    }).join('');

    updateStats();
  }

  // ─── Interactions ─────────────────────────────────────────────────────────
  function onDisplayNameChange(idx, value) {
    games[idx].displayName = value;
    games[idx].modified = (value !== computeFromTemplate(idx));
    document.getElementById(`input-${idx}`)?.classList.toggle('modified', games[idx].modified);
    updateStats();
    clearTimeout(onDisplayNameChange._t);
    onDisplayNameChange._t = setTimeout(updatePreview, 400);
  }

  function computeFromTemplate(idx) {
    const tpl = document.getElementById('templateInput').value || '{name}';
    const g = games[idx];
    return applyTemplate(tpl, g.fields) || g.fields.name || g.fields.filename;
  }

  function applyFieldToAll() {
    games.forEach((_, idx) => {
      games[idx].displayName = computeFromTemplate(idx);
      games[idx].modified = false;
    });
    renderTable();
    updatePreview();
    updateTemplatePreviewLine();
    showToast(t('toastApplied'));
  }

  function resetRow(idx) {
    games[idx].displayName = computeFromTemplate(idx);
    games[idx].modified = false;
    const input = document.getElementById(`input-${idx}`);
    if (input) { input.value = games[idx].displayName; input.classList.remove('modified'); }
    updateStats();
    updatePreview();
  }

  function resetAll() {
    if (!confirm(t('confirmReset'))) return;
    applyFieldToAll();
  }

  function filterRows() {
    filterText = document.getElementById('searchInput').value;
    renderTable();
  }

  // ─── Stats ────────────────────────────────────────────────────────────────
  function updateStats() {
    document.getElementById('statTotal').textContent    = games.length;
    document.getElementById('statModified').textContent = games.filter(g => g.modified).length;
    document.getElementById('statFiltered').textContent = getFilteredGames().length;
  }

  // ─── Preview ──────────────────────────────────────────────────────────────
  function updatePreview() {
    const lines = games.slice(0, 50).map(g =>
      `<span class="preview-line-file">${escapeHtml(g.path)}</span>\t<span class="preview-line-name">${escapeHtml(g.displayName)}</span>`
    );
    const preview = document.getElementById('previewCode');
    preview.innerHTML = lines.join('\n');
    if (games.length > 50) {
      preview.innerHTML += `\n<span style="color:var(--text-muted);font-style:italic">${escapeHtml(t('moreLines', games.length - 50))}</span>`;
    }
  }

  function escapeHtml(str) {
    return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // ─── Generate & Download ──────────────────────────────────────────────────
  function generateAndDownload() {
    const content = games.map(g => `${g.path}\t${g.displayName}`).join('\n');
    const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'map.txt';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast(t('toastGenerated', games.length));
  }

  // ─── Toast ────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.remove('hide');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.add('hide'), 3000);
  }

  // ─── Init ─────────────────────────────────────────────────────────────────
  setLang(lang);
</script>
</body>
</html>
